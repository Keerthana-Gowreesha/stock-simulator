<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A simple stock market simulator with live prices from Yahoo Finance. Buy, sell, and track your portfolio.">
    <title>My Simple Stock Simulator</title>
    <style>
        body {
            font-family: "Courier New", Courier, monospace;
            background-color: #f0f8ff;
            color: #333;
            margin: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4500;
            display: inline-block;
            border-bottom: 3px double #ff4500;
            padding-bottom: 10px;
            margin: 10px 0;
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border: 3px solid #333;
            box-shadow: 8px 8px 0px #333;
        }

        section {
            border: 2px dashed #666;
            padding: 15px;
            margin-bottom: 20px;
            background: #fafafa;
        }

        h2 {
            font-size: 1.1em;
            margin-top: 0;
            color: #00008b;
            text-decoration: underline;
        }

        select,
        input,
        button {
            font-family: inherit;
            font-size: 1em;
            padding: 8px;
            margin: 5px 0;
            border: 2px solid #333;
            border-radius: 0;
        }

        button {
            background-color: #4df;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #0cc;
        }

        .price-display {
            font-size: 1.2em;
            font-weight: bold;
            color: #2e8b57;
            margin: 10px 0;
            background-color: #e6f7ed;
            padding: 5px;
            border: 1px solid #2e8b57;
            display: inline-block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 2px solid #333;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #ffe4b5;
        }

        .profit {
            color: green;
            font-weight: bold;
        }

        .loss {
            color: red;
            font-weight: bold;
        }

        .sell-btn {
            background-color: #ff6347;
            color: white;
            padding: 4px 8px;
            font-size: 0.9em;
        }

        .sell-btn:hover {
            background-color: #d9381e;
        }
    </style>
    <!-- Load prices.js at startup -->
    <script id="prices-script" src="prices.js"></script>
</head>

<body>

    <header>
        <h1>$$$ MY STOCK MARKET SIMULATOR $$$</h1>

    </header>

    <main>
        <!-- Section 1: Fetch Price -->
        <section id="check-price-section">
            <h2>Step 1: Check Stock Price</h2>
            <label for="company-select">Choose a Company:</label><br>
            <select id="company-select">
                <option value="RELIANCE.BO">Reliance Industries (RELIANCE.BO)</option>
                <option value="TCS.BO">Tata Consultancy Services (TCS.BO)</option>
                <option value="INFY.BO">Infosys (INFY.BO)</option>
                <option value="HDFCBANK.BO">HDFC Bank (HDFCBANK.BO)</option>
                <option value="ICICIBANK.BO">ICICI Bank (ICICIBANK.BO)</option>
            </select>
            <br>
            <button id="get-price-btn">Get Price</button>
            <div>
                <span class="price-display" id="price-output">Price: Not Fetched Yet</span>
            </div>
        </section>

        <!-- Section 2: Buy Stock -->
        <section id="buy-stock-section">
            <h2>Step 2: Buy Stock</h2>
            <label for="buy-qty">Quantity to Buy:</label><br>
            <input type="number" id="buy-qty" value="1" min="1" style="width: 70px;">
            <br>
            <button id="buy-btn" style="background-color: #90ee90;">BUY STOCK</button>
        </section>

        <!-- Section 3: Portfolio Tracker -->
        <section id="portfolio-section">
            <h2>Step 3: My Portfolio (My Stocks)</h2>
            <div>
                <button id="refresh-btn" style="background-color: #ffd700;">Refresh Prices (Fetch Live)</button>
                <button id="simulate-next-day-btn" style="background-color: #ffb6c1;">Simulate Next Day (Random
                    Fluctuate)</button>
            </div>

            <table id="portfolio-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Qty</th>
                        <th>Buy Price (INR)</th>
                        <th>Current Price (INR)</th>
                        <th>Profit/Loss</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="portfolio-body">
                    <tr id="empty-row">
                        <td colspan="6" style="text-align: center; color: #888;">No stocks bought yet. Go buy some!</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        // Global tracking states
        let currentPrices = {
            "RELIANCE.BO": null,
            "TCS.BO": null,
            "INFY.BO": null,
            "HDFCBANK.BO": null,
            "ICICIBANK.BO": null
        };

        let portfolio = [];

        // Cache DOM Elements
        const getPriceBtn = document.getElementById("get-price-btn");
        const priceOutput = document.getElementById("price-output");
        const companySelect = document.getElementById("company-select");
        const buyQtyInput = document.getElementById("buy-qty");
        const buyBtn = document.getElementById("buy-btn");
        const portfolioBody = document.getElementById("portfolio-body");
        const refreshBtn = document.getElementById("refresh-btn");
        const simulateBtn = document.getElementById("simulate-next-day-btn");

        // Dynamically reloads the script generated by the C program to fetch new prices
        async function reloadPricesFromC() {
            return new Promise((resolve) => {
                const oldScript = document.getElementById("prices-script");
                if (oldScript) {
                    oldScript.remove();
                }

                const script = document.createElement("script");
                script.id = "prices-script";
                // Add timestamp parameter to bust browser cache
                script.src = "prices.js?t=" + new Date().getTime();

                script.onload = () => {
                    if (typeof livePrices !== "undefined") {
                        for (const symbol in livePrices) {
                            currentPrices[symbol] = livePrices[symbol];
                        }
                        resolve(true);
                    } else {
                        resolve(false);
                    }
                };
                script.onerror = () => {
                    resolve(false);
                };
                document.head.appendChild(script);
            });
        }

        // Fetch price from prices.js file written by C program
        async function fetchStockPrice(symbol) {
            priceOutput.innerText = "Loading price from C program (prices.js)...";
            const success = await reloadPricesFromC();

            if (success && currentPrices[symbol] !== null && currentPrices[symbol] !== undefined) {
                return currentPrices[symbol];
            } else {
                alert("Error: Could not load stock data from C output 'prices.js'.\n\nPlease ensure that:\n1. You compiled fetch.c (gcc fetch.c -o fetch.exe)\n2. You are running fetch.exe in the background!");
                return null;
            }
        }

        // Get Price button logic
        getPriceBtn.addEventListener("click", async () => {
            const symbol = companySelect.value;
            const price = await fetchStockPrice(symbol);
            if (price !== null) {
                priceOutput.innerText = `Price: ${price.toFixed(2)} INR`;
            } else {
                priceOutput.innerText = `Price: Error Loading`;
            }
        });

        // Buy button logic
        buyBtn.addEventListener("click", async () => {
            const symbol = companySelect.value;
            let price = currentPrices[symbol];

            // If price wasn't fetched yet, get it now
            if (price === null) {
                price = await fetchStockPrice(symbol);
            }
            if (price === null) return;

            const qty = parseInt(buyQtyInput.value);
            if (isNaN(qty) || qty <= 0) {
                alert("Error: Please enter a valid quantity of 1 or more!");
                return;
            }

            // Add to portfolio list
            portfolio.push({
                symbol: symbol,
                qty: qty,
                buyPrice: price,
                currentPrice: price
            });

            priceOutput.innerText = `Price: ${price.toFixed(2)} INR`;
            alert(`Successfully Bought ${qty} share(s) of ${symbol} at ${price.toFixed(2)} INR!`);
            updatePortfolioTable();
        });

        // Refresh Prices (Fetch Live from C File output)
        refreshBtn.addEventListener("click", async () => {
            if (portfolio.length === 0) {
                alert("Error: Buy some stocks first before trying to refresh!");
                return;
            }

            refreshBtn.innerText = "Refreshing from C file...";
            refreshBtn.disabled = true;

            const success = await reloadPricesFromC();
            if (success) {
                portfolio.forEach(item => {
                    if (currentPrices[item.symbol] !== null && currentPrices[item.symbol] !== undefined) {
                        item.currentPrice = currentPrices[item.symbol];
                    }
                });
                updatePortfolioTable();
                alert("Portfolio prices updated using real data from C program!");
            } else {
                alert("Error: Could not reload prices from C output 'prices.js'. Is 'fetch.exe' running?");
            }

            refreshBtn.innerText = "Refresh Prices (Fetch Live)";
            refreshBtn.disabled = false;
        });

        // Simulate Next Day (Random Fluctuation)
        simulateBtn.addEventListener("click", () => {
            if (portfolio.length === 0) {
                alert("Error: Buy some stocks first to simulate price fluctuation!");
                return;
            }

            portfolio.forEach(item => {
                // Fluctuate price randomly between -8% and +8% to simulate next day's price
                const changePercent = (Math.random() * 16 - 8) / 100; // -0.08 to +0.08
                item.currentPrice = item.currentPrice * (1 + changePercent);

                // Sync with global price state
                currentPrices[item.symbol] = item.currentPrice;
            });

            updatePortfolioTable();
            alert("Simulated next day! Prices fluctuated randomly.");
        });

        // Sell stock logic (remove from portfolio)
        window.sellStock = function (index) {
            const item = portfolio[index];
            const profitLoss = (item.currentPrice - item.buyPrice) * item.qty;

            let profitLossMsg = "";
            if (profitLoss >= 0) {
                profitLossMsg = `Profit: +${profitLoss.toFixed(2)} INR`;
            } else {
                profitLossMsg = `Loss: ${profitLoss.toFixed(2)} INR`;
            }

            const confirmSell = confirm(`Sell all ${item.qty} share(s) of ${item.symbol}?\n${profitLossMsg}`);
            if (confirmSell) {
                // Remove stock from the portfolio array
                portfolio.splice(index, 1);
                updatePortfolioTable();
            }
        };

        // Update the portfolio HTML table based on state array
        function updatePortfolioTable() {
            if (portfolio.length === 0) {
                portfolioBody.innerHTML = `
                <tr id="empty-row">
                    <td colspan="6" style="text-align: center; color: #888;">No stocks bought yet. Go buy some!</td>
                </tr>
            `;
                return;
            }

            let html = "";
            portfolio.forEach((item, index) => {
                const totalBuyVal = item.buyPrice * item.qty;
                const totalCurrVal = item.currentPrice * item.qty;
                const pl = totalCurrVal - totalBuyVal;
                const plClass = pl >= 0 ? "profit" : "loss";
                const plText = (pl >= 0 ? "+" : "") + pl.toFixed(2) + " INR";

                html += `
                <tr>
                    <td><strong>${item.symbol}</strong></td>
                    <td>${item.qty}</td>
                    <td>${item.buyPrice.toFixed(2)}</td>
                    <td>${item.currentPrice.toFixed(2)}</td>
                    <td class="${plClass}">${plText}</td>
                    <td>
                        <button class="sell-btn" onclick="sellStock(${index})">SELL</button>
                    </td>
                </tr>
            `;
            });

            portfolioBody.innerHTML = html;
        }
    </script>

</body>

</html>
